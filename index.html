<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SAR Engenharia By Vinicius Saraiva</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
}

h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

p {
    color: #555;
    margin-bottom: 30px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    background: #1b5e20;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #2e7d32;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 30px;
    border-radius: 8px;
    text-align: center;
    min-width: 300px;
}

input {
    padding: 8px;
    margin-top: 10px;
    width: 200px;
}

.error {
    color: red;
    font-size: 14px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>SAR – Sistema Avançado de Resposta</h1>
    <p>Classificação e Enquadramento Técnico Automatizado</p>
    <button onclick="abrirModal()">Acessar Sistema</button>
</div>

<div class="modal" id="modalSenha">
    <div class="modal-content">
        <h3>Digite a senha de acesso</h3>
        <input type="password" id="senhaInput" placeholder="Senha">
        <br><br>
        <button onclick="verificarSenha()">Entrar</button>
        <div class="error" id="erroSenha"></div>
    </div>
</div>

<script>
const SENHA_CORRETA = "Sar2026"; // pode alterar depois

function abrirModal() {
    document.getElementById("modalSenha").style.display = "flex";
}

function verificarSenha() {
    const senha = document.getElementById("senhaInput").value;

    if (senha === SENHA_CORRETA) {
        sessionStorage.setItem("acesso_liberado", "true");
        window.location.href = "app.html";
    } else {
        document.getElementById("erroSenha").innerText = "Senha incorreta.";
    }
}
</script>

</body>
</html>
