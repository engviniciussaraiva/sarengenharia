function abrirModulo(modulo){

    if(modulo === "INICIO"){
        mostrarHome();
        return;
    }

    carregarAbas(modulo);

    document.getElementById("mainContent").innerHTML = `

        <div class="welcome">

            <h1>${modulo}</h1>

            <p>Selecione uma ferramenta acima.</p>

        </div>

    `;

}
