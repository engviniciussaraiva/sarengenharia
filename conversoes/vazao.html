<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Conversão de Vazão</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: transparent;
      color: #e8eeee;
      font-family: Arial, Helvetica, sans-serif;
    }

    .conversor {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      padding: 28px;
      background: #171d1f;
      border: 1px solid #344548;
      border-radius: 12px;
    }

    .conversor__titulo {
      margin: 0 0 28px;
      color: #ffffff;
      font-size: 26px;
      line-height: 1.25;
      text-align: center;
    }

    .campo {
      margin-bottom: 20px;
    }

    .campo label {
      display: block;
      margin-bottom: 8px;
      color: #f2f5f5;
      font-size: 16px;
      font-weight: 700;
    }

    .campo input,
    .campo select {
      width: 100%;
      min-height: 48px;
      padding: 10px 13px;
      background: #222a2c;
      color: #ffffff;
      border: 1px solid #566568;
      border-radius: 6px;
      outline: none;
      font-size: 16px;
    }

    .campo input::placeholder {
      color: #9ba6a8;
    }

    .campo input:focus,
    .campo select:focus {
      border-color: #58a89f;
      box-shadow: 0 0 0 2px rgba(88, 168, 159, 0.18);
    }

    .acoes {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .botao-limpar {
      min-width: 150px;
      min-height: 46px;
      padding: 11px 22px;
      background: #465255;
      color: #ffffff;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      transition:
        background-color 0.2s ease,
        transform 0.1s ease;
    }

    .botao-limpar:hover {
      background: #59676a;
    }

    .botao-limpar:active {
      transform: translateY(1px);
    }

    .resultado {
      display: none;
      margin-top: 24px;
      padding: 20px;
      background: #20282a;
      border: 1px solid #344548;
      border-radius: 8px;
    }

    .resultado.ativo {
      display: block;
    }

    .resultado__titulo {
      margin: 0 0 16px;
      color: #ffffff;
      font-size: 17px;
    }

    .resultado__lista {
      display: grid;
      gap: 10px;
    }

    .resultado__linha {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 10px 12px;
      background: #171d1f;
      border-radius: 6px;
    }

    .resultado__unidade {
      color: #b9c4c5;
      font-size: 15px;
    }

    .resultado__valor {
      color: #ffffff;
      font-size: 17px;
      font-weight: 700;
      text-align: right;
    }

    .mensagem {
      display: none;
      margin-top: 14px;
      padding: 12px;
      color: #ffd4d4;
      background: rgba(180, 45, 45, 0.15);
      border: 1px solid rgba(255, 100, 100, 0.35);
      border-radius: 6px;
      font-size: 14px;
    }

    .mensagem.ativa {
      display: block;
    }

    @media (max-width: 600px) {
      body {
        padding: 14px;
      }

      .conversor {
        padding: 20px;
      }

      .conversor__titulo {
        font-size: 22px;
      }

      .acoes {
        display: block;
      }

      .botao-limpar {
        width: 100%;
      }

      .resultado__linha {
        align-items: flex-start;
        flex-direction: column;
        gap: 5px;
      }

      .resultado__valor {
        text-align: left;
      }
    }
  </style>
</head>

<body>

  <main class="conversor">

    <h1 class="conversor__titulo">
      Conversor de Unidades de Vazão
    </h1>

    <div class="campo">
      <label for="valorVazao">
        Valor da vazão
      </label>

      <input
        id="valorVazao"
        type="text"
        inputmode="decimal"
        autocomplete="off"
        placeholder="Digite o valor"
      >
    </div>

    <div class="campo">
      <label for="unidadeEntrada">
        Unidade de entrada
      </label>

      <select id="unidadeEntrada">
        <option value="">
          — Selecione —
        </option>

        <option value="ls">
          Litros por segundo (L/s)
        </option>

        <option value="lmin">
          Litros por minuto (L/min)
        </option>

        <option value="lh">
          Litros por hora (L/h)
        </option>

        <option value="m3s">
          Metros cúbicos por segundo (m³/s)
        </option>

        <option value="m3min">
          Metros cúbicos por minuto (m³/min)
        </option>

        <option value="m3h">
          Metros cúbicos por hora (m³/h)
        </option>

        <option value="gpm">
          Galões americanos por minuto (gpm)
        </option>
      </select>
    </div>

    <div class="acoes">
      <button
        id="botaoLimpar"
        class="botao-limpar"
        type="button"
      >
        Limpar
      </button>
    </div>

    <div
      id="mensagem"
      class="mensagem"
      role="alert"
    ></div>

    <section
      id="resultado"
      class="resultado"
      aria-live="polite"
    >
      <h2 class="resultado__titulo">
        Resultado da conversão
      </h2>

      <div
        id="listaResultados"
        class="resultado__lista"
      ></div>
    </section>

  </main>

  <script>
    const campoValor = document.getElementById("valorVazao");
    const campoUnidade = document.getElementById("unidadeEntrada");
    const botaoLimpar = document.getElementById("botaoLimpar");

    const resultado = document.getElementById("resultado");
    const listaResultados = document.getElementById("listaResultados");
    const mensagem = document.getElementById("mensagem");

    /*
      Todos os fatores convertem primeiro para L/s.

      Exemplo:
      1 L/min = 1 / 60 L/s
      1 m³/h  = 1000 / 3600 L/s
      1 gpm   = 3,785411784 / 60 L/s
    */

    const unidades = {
      ls: {
        nome: "Litros por segundo",
        simbolo: "L/s",
        paraLitrosPorSegundo: 1
      },

      lmin: {
        nome: "Litros por minuto",
        simbolo: "L/min",
        paraLitrosPorSegundo: 1 / 60
      },

      lh: {
        nome: "Litros por hora",
        simbolo: "L/h",
        paraLitrosPorSegundo: 1 / 3600
      },

      m3s: {
        nome: "Metros cúbicos por segundo",
        simbolo: "m³/s",
        paraLitrosPorSegundo: 1000
      },

      m3min: {
        nome: "Metros cúbicos por minuto",
        simbolo: "m³/min",
        paraLitrosPorSegundo: 1000 / 60
      },

      m3h: {
        nome: "Metros cúbicos por hora",
        simbolo: "m³/h",
        paraLitrosPorSegundo: 1000 / 3600
      },

      gpm: {
        nome: "Galões americanos por minuto",
        simbolo: "gpm",
        paraLitrosPorSegundo: 3.785411784 / 60
      }
    };

    function obterNumeroDigitado() {
      const texto = campoValor.value
        .trim()
        .replace(/\s/g, "")
        .replace(/\./g, "")
        .replace(",", ".");

      if (texto === "") {
        return null;
      }

      const valor = Number(texto);

      return Number.isFinite(valor) ? valor : NaN;
    }

    function formatarNumero(valor) {
      let casasDecimais;

      const valorAbsoluto = Math.abs(valor);

      if (valorAbsoluto === 0) {
        casasDecimais = 2;
      } else if (valorAbsoluto >= 1000) {
        casasDecimais = 2;
      } else if (valorAbsoluto >= 1) {
        casasDecimais = 3;
      } else if (valorAbsoluto >= 0.01) {
        casasDecimais = 4;
      } else {
        casasDecimais = 6;
      }

      return valor.toLocaleString("pt-BR", {
        minimumFractionDigits: 0,
        maximumFractionDigits: casasDecimais
      });
    }

    function mostrarMensagem(texto) {
      mensagem.textContent = texto;
      mensagem.classList.add("ativa");
    }

    function esconderMensagem() {
      mensagem.textContent = "";
      mensagem.classList.remove("ativa");
    }

    function esconderResultado() {
      resultado.classList.remove("ativo");
      listaResultados.innerHTML = "";
    }

    function criarLinhaResultado(unidade, valor) {
      return `
        <div class="resultado__linha">
          <span class="resultado__unidade">
            ${unidade.nome}
          </span>

          <span class="resultado__valor">
            ${formatarNumero(valor)} ${unidade.simbolo}
          </span>
        </div>
      `;
    }

    function converterVazao() {
      esconderMensagem();

      const chaveEntrada = campoUnidade.value;
      const valorEntrada = obterNumeroDigitado();

      if (!chaveEntrada) {
        esconderResultado();
        return;
      }

      if (valorEntrada === null) {
        esconderResultado();
        return;
      }

      if (Number.isNaN(valorEntrada)) {
        esconderResultado();
        mostrarMensagem("Digite um valor numérico válido.");
        return;
      }

      if (valorEntrada < 0) {
        esconderResultado();
        mostrarMensagem("A vazão não pode possuir valor negativo.");
        return;
      }

      const unidadeEntrada = unidades[chaveEntrada];

      const litrosPorSegundo =
        valorEntrada * unidadeEntrada.paraLitrosPorSegundo;

      const resultadosConvertidos = Object.entries(unidades)
        .map(([chave, unidade]) => {
          const valorConvertido =
            litrosPorSegundo / unidade.paraLitrosPorSegundo;

          return {
            chave,
            unidade,
            valor: valorConvertido
          };
        });

      listaResultados.innerHTML = resultadosConvertidos
        .map(item => {
          return criarLinhaResultado(
            item.unidade,
            item.valor
          );
        })
        .join("");

      resultado.classList.add("ativo");
    }

    function limparCampos() {
      campoValor.value = "";
      campoUnidade.value = "";

      esconderMensagem();
      esconderResultado();

      campoValor.focus();
    }

    campoUnidade.addEventListener("change", converterVazao);
    campoValor.addEventListener("input", converterVazao);
    botaoLimpar.addEventListener("click", limparCampos);
  </script>

</body>
</html>
