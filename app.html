<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SAR 1.0 – Sistema Avançado de Resposta</title>

<style>
:root{
  --primary:#176f3d;
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#222;

  --clcb:#2e7d32;
  --pts:#ef6c00;
  --pt:#d32f2f;
  --ct:#6a1b9a;
}

body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== BARRA SUPERIOR ===== */
.topbar{
  height:60px;
  background:var(--primary);
  display:flex;
  align-items:center;
  padding:0 25px;
  color:#fff;
  font-weight:600;
  font-size:18px;
}

/* ===== LAYOUT ===== */
.layout{
  display:flex;
  min-height:calc(100vh - 60px);
}

.main{
  flex:1;
  padding:30px;
}

.sidebar{
  width:340px;
  background:#fff;
  border-left:1px solid #ddd;
  padding:20px;
  position:sticky;
  top:60px;
  height:calc(100vh - 60px);
  box-shadow:-3px 0 8px rgba(0,0,0,0.04);
}

.sidebar h3{
  margin-top:0;
  color:var(--primary);
}

/* ===== CARDS ===== */
.card{
  background:var(--card);
  border-radius:10px;
  padding:20px;
  margin-bottom:25px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

details.card summary{
  font-weight:700;
  font-size:18px;
  cursor:pointer;
  color:var(--primary);
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:15px;
}

.grid3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
  margin-top:15px;
}

label{
  font-weight:600;
  display:block;
  margin-top:10px;
}

input, select{
  width:100%;
  padding:7px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:14px;
}

/* ===== BADGES ===== */
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  color:#fff;
  font-size:12px;
  font-weight:700;
}

.badge.clcb{ background:var(--clcb); }
.badge.pts{ background:var(--pts); }
.badge.pt{ background:var(--pt); }
.badge.ct{ background:var(--ct); }

.status{
  font-size:12px;
  font-weight:700;
  margin-left:10px;
}

.btn{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
  margin-top:15px;
}

.btn:hover{
  background:#1c8046;
}

hr{
  border:none;
  border-top:1px solid #eee;
  margin:20px 0;
}
</style>
</head>

<body>

<div class="topbar">
SAR – Sistema Avançado de Resposta
</div>

<div class="layout">

<!-- ===== MAIN ===== -->
<div class="main">

<!-- 🧱 LOTE -->
<div class="card">
<h3>🧱 Lote</h3>

<label>Quantidade de Edificações:</label>
<input type="number" value="1" min="1">

<label>Nome da Edificação:</label>
<input type="text" id="nomeEdificacao" value="Bloco Principal">

</div>

<!-- 🏢 EDIFICAÇÃO -->
<details class="card" open>
<summary>
🏢 Edificação – <span id="tituloEdificacao">Bloco Principal</span>
<span class="status">🟡 Parcial</span>
<span id="badgeProcesso" class="badge clcb">CLCB</span>
</summary>

<div class="grid2">

<div>
<label>Grupo de Ocupação:</label>
<select>
<option>-- Selecionar --</option>
</select>

<label>Altura Total (m):</label>
<input type="number">
</div>

<div>
<label>Possui Subsolo?</label>
<select>
<option>Não</option>
<option>Sim</option>
</select>

<label>Pavimentos:</label>
<input type="number">
</div>

</div>

<hr>

<h4>📐 Áreas</h4>

<div class="grid3">

<div>
<label>Área Total Edificada (m²)</label>
<input type="number" id="areaTotal">
</div>

<div>
<label>Área Descontada (m²)</label>
<input type="number" id="areaDescontada">
</div>

<div>
<label>Área Computada (m²)</label>
<input type="number" id="areaComputada" readonly>
</div>

</div>

<button class="btn">Indicar Áreas Descontadas</button>

</details>

</div>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

<h3>📊 Análise do Lote</h3>

<div>
<strong>Área Total:</strong>
<div id="painelAreaTotal">0,00 m²</div>
</div>

<div style="margin-top:15px;">
<strong>Área Computada:</strong>
<div id="painelAreaComp">0,00 m²</div>
</div>

<hr>

<div style="margin-top:15px;">
<strong>Processo Provisório:</strong><br>
<span id="painelBadge" class="badge clcb">CLCB</span>
</div>

</div>

</div>

<script>

document.getElementById("nomeEdificacao").addEventListener("input", function(){
  document.getElementById("tituloEdificacao").innerText =
    this.value || "Bloco Principal";
});

function atualizar(){
  const total = parseFloat(document.getElementById("areaTotal").value)||0;
  const desc = parseFloat(document.getElementById("areaDescontada").value)||0;

  const comp = total - desc;

  document.getElementById("areaComputada").value = comp.toFixed(2);

  document.getElementById("painelAreaTotal").innerText = total.toFixed(2)+" m²";
  document.getElementById("painelAreaComp").innerText = comp.toFixed(2)+" m²";

  let processo = comp <= 750 ? "CLCB" : "PTS";
  atualizarBadge(processo);
}

function atualizarBadge(processo){
  const badge = document.getElementById("painelBadge");
  const badgeCard = document.getElementById("badgeProcesso");

  badge.className="badge";
  badgeCard.className="badge";

  if(processo==="CLCB"){badge.classList.add("clcb"); badgeCard.classList.add("clcb");}
  if(processo==="PTS"){badge.classList.add("pts"); badgeCard.classList.add("pts");}

  badge.innerText=processo;
  badgeCard.innerText=processo;
}

document.getElementById("areaTotal").addEventListener("input", atualizar);
document.getElementById("areaDescontada").addEventListener("input", atualizar);

</script>

</body>
</html>
